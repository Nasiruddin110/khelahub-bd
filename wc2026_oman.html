const GROUP_KEYS = ["A","B","C","D","E","F","G","H","I","J","K","L"];
const KNOCKOUT_KEYS = ["R32","R16","QF","SF","3RD","FINAL"];

let activeTab = "group";

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active', ['group','knockout','groups'][i] === tab);
  });
  const si = document.getElementById('searchInput');
  if(si) si.value = '';
  renderMatches();
}

function renderMatches() {
  const content = document.getElementById('mainContent');
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();

  if (activeTab === 'groups') {
    let html = '<p class="groups-note">মোট ১২টি গ্রুপে ৪৮টি দল</p><div class="groups-grid">';
    for (const [g, teams] of Object.entries(GROUPS)) {
      html += `<div class="group-card" style="border-left-color:${GROUP_COLORS[g]}">
        <div class="group-title" style="color:${GROUP_COLORS[g]}">গ্রুপ ${g}</div>
        ${teams.map(t=>`<div class="group-team">• ${t}</div>`).join('')}
      </div>`;
    }
    html += '</div>';
    content.innerHTML = html + footer();
    return;
  }

  const filtered = ALL_MATCHES.filter(day => {
    const isGroup = day.matches.some(m => GROUP_KEYS.includes(m.group));
    const isKnockout = day.matches.some(m => KNOCKOUT_KEYS.includes(m.group));
    if (activeTab === 'group' && !isGroup) return false;
    if (activeTab === 'knockout' && !isKnockout) return false;
    if (q) return day.matches.some(m =>
      m.home.toLowerCase().includes(q) ||
      (m.away||'').toLowerCase().includes(q) ||
      m.venue.toLowerCase().includes(q) ||
      day.date.toLowerCase().includes(q)
    );
    return true;
  });

  if (filtered.length === 0) {
    content.innerHTML = '<p class="no-result">কোনো ম্যাচ পাওয়া যায়নি।</p>';
    return;
  }

  let html = '';
  for (const day of filtered) {
    html += `<div class="day-block">
      <div class="day-header">${day.date}</div>
      <div class="matches">`;
    for (const m of day.matches) {
      const col = GROUP_COLORS[m.group] || '#6366f1';
      html += `<div class="match-card" style="border-left-color:${col}">
        <div class="match-time" style="background:${col}">🕐 ${m.time}</div>
        <div class="match-teams">
          <div class="teams">${m.home}${m.away ? ' 🆚 ' + m.away : ''}</div>
          <div class="venue">📍 ${m.venue}</div>
        </div>
        <div class="group-badge" style="color:${col}">${stageLabel(m.group)}</div>
      </div>`;
    }
    html += '</div></div>';
  }
  content.innerHTML = html + footer();
}

function footer() {
  return `<div class="footer">
    <div>🇴🇲 সব সময় ওমান স্থানীয় সময় (GMT+4) অনুযায়ী</div>
    <div>পরের দিনের উল্লেখ মানে মধ্যরাত পার হওয়ার পরে</div>
    <div>সূত্র: FIFA / Al Jazeera (৩১ মে ২০২৬)</div>
  </div>`;
}
